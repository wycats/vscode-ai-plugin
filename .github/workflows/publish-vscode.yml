name: Publish VS Code Plugin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'marketplace.json'

concurrency:
  group: publish-vscode
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build VS Code plugin
        run: |
          cp config.example.json config.json
          pnpm build

      - name: Commit build output to main
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # Set up SSH for deploy key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Force-add dist/vscode/ (overrides .gitignore)
          rm -rf dist/vscode
          cp -r out/vscode dist/vscode

          # Create marketplace.json at repo root
          echo '{"name":"wycats-ai-plugin","version":"0.1.0","description":"Agent toolkit: workflow agents, skills, and prompts.","owner":{"name":"wycats"},"plugins":[{"name":"wycats-ai-plugin","source":"./dist/vscode","description":"Agent toolkit: workflow agents, skills, and prompts."}]}' | python3 -m json.tool > marketplace.json

          git add -f dist/vscode/ marketplace.json
          
          # Only commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update VS Code plugin build [skip ci]"
            git remote set-url origin "git@github.com:${{ github.repository }}.git"
            git push origin main
          fi

          # Clean up
          rm -f ~/.ssh/deploy_key
