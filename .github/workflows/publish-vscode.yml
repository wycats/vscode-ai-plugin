name: Publish VS Code Plugin

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'dist/**'
      - 'marketplace.json'

concurrency:
  group: publish-vscode
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate plugin sources
        run: pnpm validate

      - name: Typecheck and lint scripts
        run: pnpm check

      - name: Build VS Code plugin
        run: pnpm build --config config.example.json

      - name: Commit build output to main
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          # Set up SSH for deploy key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add dist/wycats/ and remove the old dist/vscode/ root
          rm -rf dist/vscode dist/wycats
          mkdir -p dist
          cp -r out/wycats dist/wycats
          cp README.md dist/wycats/README.md

          # Create marketplace.json from the built manifest
          node <<'NODE'
          const fs = require("node:fs");

          const pluginMeta = JSON.parse(fs.readFileSync("dist/wycats/plugin.json", "utf8"));
          const marketplace = {
            name: pluginMeta.name,
            version: pluginMeta.version,
            description: pluginMeta.description,
            owner: { name: "wycats" },
            plugins: [
              {
                name: pluginMeta.name,
                source: "./dist/wycats",
                description: pluginMeta.description,
              },
            ],
          };

          fs.writeFileSync("marketplace.json", JSON.stringify(marketplace, null, 2) + "\n");
          NODE

          git rm -r --quiet --ignore-unmatch dist/vscode
          git add dist/wycats/ marketplace.json
          
          # Only commit and push if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update VS Code plugin build [skip ci]"
            git remote set-url origin "git@github.com:${{ github.repository }}.git"
            git push origin main
          fi

          # Clean up
          rm -f ~/.ssh/deploy_key
