name: Publish Claude Code Plugin

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate plugin sources
        run: pnpm validate

      - name: Typecheck and lint scripts
        run: pnpm check

      - name: Build and publish CC plugin
        run: |
          pnpm build --config config.claude-code.example.json

          # Marketplace at root, plugin in plugin/ subdirectory
          tmp=$(mktemp -d)
          mkdir -p "$tmp/plugin" "$tmp/.claude-plugin"
          cp -r out/claude-code/* out/claude-code/.claude-plugin "$tmp/plugin/"

          TMP_MARKETPLACE_ROOT="$tmp" node <<'NODE'
          const fs = require("node:fs");

          const tmp = process.env.TMP_MARKETPLACE_ROOT;
          if (!tmp) {
            throw new Error("TMP_MARKETPLACE_ROOT is not set");
          }

          const pluginMeta = JSON.parse(
            fs.readFileSync(`${tmp}/plugin/.claude-plugin/plugin.json`, "utf8"),
          );
          const marketplace = {
            $schema: "https://anthropic.com/claude-code/marketplace.schema.json",
            name: pluginMeta.name,
            version: pluginMeta.version,
            description: pluginMeta.description,
            owner: { name: "wycats" },
            plugins: [
              {
                name: pluginMeta.name,
                source: "./plugin",
                description: pluginMeta.description,
              },
            ],
          };

          fs.writeFileSync(
            `${tmp}/.claude-plugin/marketplace.json`,
            JSON.stringify(marketplace, null, 2) + "\n",
          );
          NODE

          cd "$tmp"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Claude Code plugin"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" HEAD:refs/heads/cc-plugin
